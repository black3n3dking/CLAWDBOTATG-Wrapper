plugins { id 'com.android.application' }

android {
    namespace 'com.clawdbot.wrapper'
    compileSdk 35

    defaultConfig {
        applicationId 'com.clawdbot.wrapper'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            debuggable false
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
